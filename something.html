<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forms</title>
  </head>
  <body>
    <form action="index.html" method="post">
      <label for="username">username</label>
      <input
        type="text"
        id="username"
        placeholder="spongebob squarepants"
        minlength="6"
        maxlength="18"
      />
      <br />
      <label for="password">password</label>
      <input
        type="password"
        id="password"
        placeholder="********"
        minlength="6"
        maxlength="18"
      />
      <br />
      <label for="emaail" >email.</label>
      <input type="email" id="emaail" placeholder="ss@gmail.com">
      <br />
      <label for="phone">phonenumber</label>
      <input type="tel" id="phone " placeholder="1234567890"
      minlength="10"
      maxlength="10">
      <br>

      <input type="submit" />
      <input type="reset" />
    </form>
  </body>
</html>
