<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>forms</title>
  </head>
  <body>
    <form action="index.html" method="post" enctype="multipart/form-data">
      <label for="username">username</label>
      <input
        type="text"
        id="username"
        placeholder="spongebob squarepants"
        minlength="6"
        maxlength="18"
      />
      <br />
      <label for="password">password</label>
      <input
        type="password"
        id="password"
        placeholder="********"
        minlength="6"
        maxlength="18"
      />
      <br />
      <label for="emaail">email.</label>
      <input type="email" id="emaail" placeholder="ss@gmail.com" />
      <br />
      <label for="phone">phonenumber</label>
      <input
        type="tel"
        id="phone "
        placeholder="1234567890"
        minlength="10"
        maxlength="10"
      />
      <br />
      <label for="birthday">birthday</label>
      <input type="date" id="birthday" /><br />

      <label for="quantity">quantity</label>

      <input type="number" id="quantity" min="0" max="99" value="1" /><br />

      <label for="title">title</label>
      <br />
      <label for="mr">mr</label>
      <input type="radio" id="mr" name="title" />
      <label for="doctor">doctor</label>
      <input type="radio" id="doctor" name="title" />
      <label for="miss">miss</label>
      <input type="radio" id="miss" name="title" />
      <br />

      <label for="payment">payment</label>
      <select name="payment " id="payment">
        <option value="visa">visa</option>
        <option value="mastercard">mastercard</option>
        <option value="gift card">gift card</option></select
      ><br />

      <label for="subscribe">subscribe</label>
      <input type="checkbox" id="subscribe" /><br />

      <label for="comment">comment</label>
      <textarea
        name="comment"
        id="comment"
        placeholder="add a comment about the forms of the webpage"
      ></textarea
      ><br />

      <label for="file">file </label>
      <input type="file" accept="img/png,img/jpg" /><br />

      <br />
      <input type="submit" />
      <input type="reset" />
    </form>
  </body>
</html>
